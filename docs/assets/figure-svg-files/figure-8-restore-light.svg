<svg viewBox="0 0 900 1100" width="900" height="1100" style="display: block; background: rgb(255, 255, 255); font-family: &quot;Inter&quot;, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><pattern id="grid-flow-restore-light" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="0.7" fill="#d9d5cd"/></pattern><marker id="ah-flow-restore-light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2a2722"/></marker></defs><rect x="0" y="0" width="900" height="1100" fill="url(#grid-flow-restore-light)"/><g transform="translate(40,44)"><text x="0" y="0" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="10.5" font-weight="500" fill="#6b655c" letter-spacing="1.5">FIGURE 8</text><text x="0" y="22" font-family="'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="18" font-weight="600" fill="#1a1714" letter-spacing="-0.3">Snapshot restore flow</text></g><g><rect x="240" y="98" width="420" height="44" rx="22" fill="#ffffff" stroke="#2a2722" stroke-width="1.25"/><text x="450" y="114" text-anchor="middle" dominant-baseline="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="13" font-weight="500" fill="#1a1714">API Request</text><text x="450" y="131" text-anchor="middle" dominant-baseline="middle" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="11" fill="#6b655c">POST  /v1/snapshots/{id}/restore</text></g><path d="M450,142 L450,194" fill="none" stroke="#2a2722" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ah-flow-restore-light)"/><g><rect x="240" y="194" width="420" height="72" rx="10" fill="#ffffff" stroke="#2a2722" stroke-width="1.25"/><rect x="246" y="200" width="408" height="60" rx="7" f