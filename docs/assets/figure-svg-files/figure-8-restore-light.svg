="408" height="68" rx="7" fill="none" stroke="#c88179" stroke-width="1" opacity="0.6"/><text x="450" y="766" text-anchor="middle" dominant-baseline="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="15" font-weight="600" fill="#1a1714">Circuit breaker per IOC</text><text x="450" y="786" text-anchor="middle" dominant-baseline="middle" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="11.5" fill="#6b655c">fail-fast on unresponsive IOC · see Figure 6</text></g><path d="M450,812 L450,892" fill="none" stroke="#2a2722" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ah-flow-restore-light)"/><g><rect x="250" y="892" width="400" height="48" rx="24" fill="#dcecd9" stroke="#8ab48a" stroke-width="1.25"/><text x="450" y="910" text-anchor="middle" dominant-baseline="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="14" font-weight="600" fill="#1a1714">Mark Job as COMPLETED</text><text x="450" y="927" text-anchor="middle" dominant-baseline="middle" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="11" fill="#6b655c">with success / failure counts</text></g></svg>