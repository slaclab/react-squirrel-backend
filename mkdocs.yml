# Project Information
site_name: Squirrel Backend
site_url: https://slaclab.github.io/react-squirrel-backend/
site_author: SLAC National Accelerator Laboratory - EED / Software Applications Group
site_description: High-performance Python FastAPI backend for EPICS snapshot/restore operations.

# Repository
repo_name: slaclab/react-squirrel-backend
repo_url: https://github.com/slaclab/react-squirrel-backend

# Configuration
theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - content.code.copy
    - navigation.top
    - navigation.tabs
    - navigation.indexes
    - navigation.footer
    - navigation.sections
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

# Plugins
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            members_order: source
            show_root_toc_entry: false
            show_symbol_type_toc: true
            show_source: true
            docstring_options:
              ignore_init_summary: true
            merge_init_into_class: true
  - git-revision-date-localized:
      exclude:
        - index.md
      enable_creation_date: true
      fallback_to_build_date: true
  - git-committers:
      enabled: !ENV [MKDOCS_GIT_COMMITTERS_APIKEY, false]
      exclude:
        - index.md
      repository: slaclab/react-squirrel-backend
      branch: main

# Additional Configuration
extra:
  generator: false

# Extensions
markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - images/
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables

# Page Tree
nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md
    - API Keys: getting-started/api-keys.md
  - Architecture:
    - architecture/index.md
    - Distributed System: architecture/distributed-system.md
    - Data Flow: architecture/data-flow.md
  - Development:
    - development/index.md
    - Testing: development/testing.md
    - Database Migrations: development/migrations.md
    - Code Quality: development/code-quality.md
    - E-log Plugin: development/elog-plugin.md
  - API Reference:
    - api-reference/index.md
    - REST Endpoints: api-reference/endpoints.md
    - WebSocket: api-reference/websocket.md
  - Python Reference:
    - reference/index.md
