name: Build and Deploy (Dev)

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  deployments: write
  actions: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "image_tag=main-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=main-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    uses: ad-build-test/build-system-playbooks/.github/workflows/request-deployment.yml@main
    with:
      deploy_to_container_dev: true
      tag: ${{ needs.build-and-push.outputs.image_tag }}
      playbook: container_module/container_deploy.yml
      docker_network: squirrel-net
      migration_command: alembic upgrade head
      health_check_path: /health
    secrets:
      database_url: ${{ secrets.DEV_DATABASE_URL }}
      redis_url: ${{ secrets.DEV_REDIS_URL }}
