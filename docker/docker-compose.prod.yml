services:
  api:
    image: ${SQUIRREL_IMAGE:?set SQUIRREL_IMAGE}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - ../.env.prod
    ports:
      - "8000:8000"
    restart: unless-stopped

  monitor:
    image: ${SQUIRREL_IMAGE:?set SQUIRREL_IMAGE}
    command: python -m app.monitor_main
    env_file:
      - ../.env.prod
    restart: unless-stopped

  worker:
    image: ${SQUIRREL_IMAGE:?set SQUIRREL_IMAGE}
    command: arq app.worker.WorkerSettings
    env_file:
      - ../.env.prod
    restart: unless-stopped

# Note:
# - This production compose assumes external managed Postgres/Redis from .env.prod.
# - If you host DB/Redis on the same server, add explicit db/redis services here.
