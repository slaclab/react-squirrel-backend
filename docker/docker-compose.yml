version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: squirrel-db
    environment:
      POSTGRES_USER: squirrel
      POSTGRES_PASSWORD: squirrel
      POSTGRES_DB: squirrel
    ports:
      - "5432:5432"
    volumes:
      - squirrel_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U squirrel"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: squirrel-backend
    environment:
      SQUIRREL_DATABASE_URL: postgresql+asyncpg://squirrel:squirrel@db:5432/squirrel
      SQUIRREL_DEBUG: "true"
      # EPICS environment for SLAC prod access from dev network
      # Note: These vars are set but EPICS access requires running natively on macOS
      # On Linux, uncomment network_mode: host below for EPICS access
      EPICS_CA_AUTO_ADDR_LIST: "NO"
      EPICS_CA_ADDR_LIST: "lcls-prod01:5068 lcls-prod01:5063 mcc-dmz"
      EPICS_CA_REPEATER_PORT: "5069"
      EPICS_CA_SERVER_PORT: "5068"
      EPICS_PVA_AUTO_ADDR_LIST: "NO"
      EPICS_PVA_ADDR_LIST: "lcls-prod01:5168 lcls-prod01:5063 mcc-dmz mccas0.slac.stanford.edu"
      EPICS_PVA_SERVER_PORT: "5075"
      EPICS_PVA_BROADCAST_PORT: "5076"
      EPICS_TS_NTP_INET: "134.79.48.11"
      EPICS_IOC_LOG_INET: "134.79.151.21"
    ports:
      - "8000:8000"
    volumes:
      - ../app:/app/app
      - ../tests:/app/tests
    depends_on:
      db:
        condition: service_healthy
    # For EPICS access on Linux, uncomment:
    # network_mode: host
    # And change db:5432 to localhost:5432 in DATABASE_URL above

volumes:
  squirrel_db_data:
