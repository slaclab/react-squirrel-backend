services:
  db:
    image: postgres:16-alpine
    container_name: squirrel-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - squirrel_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: squirrel-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # API Server - REST/WebSocket, reads from Redis cache
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: squirrel-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      SQUIRREL_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SQUIRREL_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SQUIRREL_DEBUG: "${SQUIRREL_DEBUG}"

      EPICS_CA_AUTO_ADDR_LIST: "${EPICS_CA_AUTO_ADDR_LIST}"
      EPICS_CA_ADDR_LIST: "${EPICS_CA_ADDR_LIST}"
      EPICS_CA_SERVER_PORT: "${EPICS_CA_SERVER_PORT}"
      EPICS_CA_REPEATER_PORT: "${EPICS_CA_REPEATER_PORT}"

      EPICS_PVA_AUTO_ADDR_LIST: "${EPICS_PVA_AUTO_ADDR_LIST}"
      EPICS_PVA_ADDR_LIST: "${EPICS_PVA_ADDR_LIST}"
      EPICS_PVA_SERVER_PORT: "${EPICS_PVA_SERVER_PORT}"
      EPICS_PVA_BROADCAST_PORT: "${EPICS_PVA_BROADCAST_PORT}"
    ports:
      - "${API_HOST_PORT:-8080}:8000"
    volumes:
      - ../app:/app/app
      - ../tests:/app/tests
      - ../scripts:/app/scripts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # DNS mapping for SLAC EPICS servers (configure in docker/.env)
    extra_hosts:
      - "${EPICS_HOST_PROD}"
      - "${EPICS_HOST_DMZ}"

  # PV Monitor - Dedicated process for EPICS monitoring, writes to Redis
  monitor:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: squirrel-monitor
    command: python -m app.monitor_main
    environment:
      SQUIRREL_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SQUIRREL_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SQUIRREL_DEBUG: "${SQUIRREL_DEBUG}"

      EPICS_CA_AUTO_ADDR_LIST: "${EPICS_CA_AUTO_ADDR_LIST}"
      EPICS_CA_ADDR_LIST: "${EPICS_CA_ADDR_LIST}"
      EPICS_CA_SERVER_PORT: "${EPICS_CA_SERVER_PORT}"
      EPICS_CA_REPEATER_PORT: "${EPICS_CA_REPEATER_PORT}"

      EPICS_PVA_AUTO_ADDR_LIST: "${EPICS_PVA_AUTO_ADDR_LIST}"
      EPICS_PVA_ADDR_LIST: "${EPICS_PVA_ADDR_LIST}"
      EPICS_PVA_SERVER_PORT: "${EPICS_PVA_SERVER_PORT}"
      EPICS_PVA_BROADCAST_PORT: "${EPICS_PVA_BROADCAST_PORT}"
    volumes:
      - ../app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Only one monitor instance should run (leader election handles this)
    deploy:
      replicas: 1
    # DNS mapping for SLAC EPICS servers (configure in docker/.env)
    extra_hosts:
      - "${EPICS_HOST_PROD}"
      - "${EPICS_HOST_DMZ}"

  # Arq Worker - Background task processing for snapshots
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    # Remove container_name when using replicas
    # container_name: squirrel-worker
    command: arq app.worker.WorkerSettings
    environment:
      SQUIRREL_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SQUIRREL_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SQUIRREL_DEBUG: "${SQUIRREL_DEBUG}"

      # EPICS Channel Access (needed for snapshot restore)
      EPICS_CA_AUTO_ADDR_LIST: "${EPICS_CA_AUTO_ADDR_LIST}"
      EPICS_CA_ADDR_LIST: "${EPICS_CA_ADDR_LIST}"
      EPICS_CA_REPEATER_PORT: "${EPICS_CA_REPEATER_PORT}"
      EPICS_CA_SERVER_PORT: "${EPICS_CA_SERVER_PORT}"
    volumes:
      - ../app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # DNS mapping for SLAC EPICS servers (needed for snapshot restore)
    extra_hosts:
      - "${EPICS_HOST_PROD}"
      - "${EPICS_HOST_DMZ}"
    deploy:
      replicas: 2  # Can scale workers independently

  # Legacy backend alias (for backward compatibility)
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: squirrel-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      SQUIRREL_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SQUIRREL_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SQUIRREL_DEBUG: "${SQUIRREL_DEBUG}"
      # Enable embedded monitor for backward compatibility
      SQUIRREL_EMBEDDED_MONITOR: "true"

      EPICS_CA_AUTO_ADDR_LIST: "${EPICS_CA_AUTO_ADDR_LIST}"
      EPICS_CA_ADDR_LIST: "${EPICS_CA_ADDR_LIST}"
      EPICS_CA_REPEATER_PORT: "${EPICS_CA_REPEATER_PORT}"
      EPICS_CA_SERVER_PORT: "${EPICS_CA_SERVER_PORT}"

      EPICS_PVA_AUTO_ADDR_LIST: "${EPICS_PVA_AUTO_ADDR_LIST}"
      EPICS_PVA_ADDR_LIST: "${EPICS_PVA_ADDR_LIST}"
      EPICS_PVA_SERVER_PORT: "${EPICS_PVA_SERVER_PORT}"
      EPICS_PVA_BROADCAST_PORT: "${EPICS_PVA_BROADCAST_PORT}"
    ports:
      - "8001:8000"
    volumes:
      - ../app:/app/app
      - ../tests:/app/tests
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - legacy  # Only start with --profile legacy

volumes:
  squirrel_db_data:
