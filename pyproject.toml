[tool.black]
line_length = 120

[tool.ruff]
extend-exclude = ["__init__.py"]
line-length = 120

[tool.isort]
profile = "black"
color_output = true
extend_skip = ["__init__.py"]
length_sort = true
sections = ["FUTURE", "STDLIB", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]

[tool.pytest.ini_options]
filterwarnings = [
    "ignore::DeprecationWarning",
]
